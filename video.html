<!DOCTYPE html>
<html lang="ar">
<head>

  <title>فيديو حصري</title>

    body {
      margin: 0;
      font-family: Arial, sans-serif;

      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 80px auto;
      padding: 20px;
      background: #1c1c1c;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      color: #00ffcc;
    }

    p {
      color: #ccc;
    }

    iframe {
      margin-top: 20px;
      border-radius: 10px;
    }

    .warning {
      margin-top: 15px;
      color: #ff4d4d;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h1>🔥 فيديو حصري</h1>
  <p>قم بإكمال خطوة بسيطة لفتح الفيديو</p>

    src="https://www.youtube.com/embed/VIDEO_ID"
    frameborder="0" allowfullscreen>
    </iframe>
  </div>

  <p class="warning">⚠️ هذا الفيديو متاح لفترة محدودة</p>
</div>
